<div>
  <div class="container">
    <h1>Voting session</h1>
    <form class="form-session" (ngSubmit)="createVotingSession()">
      <label for="topic">Topic:</label>
      <input type="text" name="topic" id="topic" [(ngModel)]="topic" required>

      <label for="description">Description:</label>
      <input type="text" name="description" id="description" [(ngModel)]="description" required>

      <label for="start">Start At:</label>
      <input type="datetime-local" name="start" id="start" [(ngModel)]="startAt">

      <label for="end">End At</label>
      <input type="datetime-local" name="end" id="end" [(ngModel)]="endAt">
      
      <button type="submit">Submit</button>
    </form>

    <div class="session">
      <form class="form-cpf">
        <label for="cpf">CPF:</label>
        <input type="text" name="cpf" id="cpf" [(ngModel)]="cpf" placeholder="minimum of 11 numbers">
      </form>

      <div>

        @for (item of votingSessions; track $index) {
          <div>
            <h2>{{ item.topic }}</h2>

            <div>
              <span>StartAt: {{ dateFormat(item.startAt) }}</span>
              <span>EndAt: {{ dateFormat(item.endAt) }}</span>
            </div>
          
            <p>{{ item.description }}</p>

            <div>
              <button>YES</button>
              <button>NO</button>
            </div>
          </div>
        }
        
      </div>
    </div>

  </div>
</div>
